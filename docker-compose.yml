# تشغيل الإنتاج/بيئة كاملة: postgres + api + web
# ملاحظة: جهاز التطوير الحالي بلا Docker — التطوير المحلي يستخدم SQLite
# (انظر prisma/schema.prisma). عند التشغيل بهذا الملف: بدّل provider إلى
# postgresql وشغّل المهاجرات.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: manarah
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-manarah_dev}
      POSTGRES_DB: manarah
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manarah"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://manarah:${POSTGRES_PASSWORD:-manarah_dev}@postgres:5432/manarah
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      PORT: "3001"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
